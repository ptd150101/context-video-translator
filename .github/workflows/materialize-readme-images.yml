name: Materialize README images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/materialize-readme-images.yml'
      - 'docs/images/*-hq.webp.b64.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode high-resolution screenshots
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode docs/images/japanese-study-vietnamese-hq.webp.b64.txt > docs/images/japanese-study-vietnamese.webp
          base64 --decode docs/images/context-translation-vietnamese-hq.webp.b64.txt > docs/images/context-translation-vietnamese.webp
          base64 --decode docs/images/context-translation-english-hq.webp.b64.txt > docs/images/context-translation-english.webp
          base64 --decode docs/images/multilingual-translation-french-hq.webp.b64.txt > docs/images/multilingual-translation-french.webp

          file docs/images/*.webp

      - name: Update README and remove low-resolution assets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('docs/images/japanese-study-vietnamese.svg', 'docs/images/japanese-study-vietnamese.webp')
          text = text.replace('docs/images/context-translation-vietnamese.svg', 'docs/images/context-translation-vietnamese.webp')
          text = text.replace('docs/images/context-translation-english.svg', 'docs/images/context-translation-english.webp')
          text = text.replace('docs/images/multilingual-translation-french.svg', 'docs/images/multilingual-translation-french.webp')
          path.write_text(text, encoding='utf-8')
          PY

          rm -f docs/images/japanese-study-vietnamese.svg
          rm -f docs/images/context-translation-vietnamese.svg
          rm -f docs/images/context-translation-english.svg
          rm -f docs/images/multilingual-translation-french.svg
          rm -f docs/images/*-hq.webp.b64.txt

      - name: Commit replacement images
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md docs/images
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'Replace README screenshots with high-resolution WebP images'
          git push
